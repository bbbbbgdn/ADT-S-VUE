<!DOCTYPE html>
<html lang="en">
<head>
    <title>imported: ADT_homepage_video</title>
    <style>
        body {
            margin: 0;
            color: #fff;
            font-family: Helvetica, Arial, sans-serif;
            overflow: hidden; /* disable scrolling / rubberband effect on mobile */
            height:100vh;
        }

        canvas {
            display: block;
            position: absolute;
            outline:0;
        }

        * {
            /* disable on touch highlights of html elements, especially on mobile! */
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

    </style>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1">
    <meta itemprop="name" content="imported: ADT_homepage_video">
    <meta itemprop="description" content="made with cables">
    <meta itemprop="image" content="screenshot.png">
    <meta name="description" content="made with cables"/>

</head>
<body>
    <canvas id="glcanvas" width="100vw" height="100vh" tabindex="1"></canvas>

    
    <script type="text/javascript" src="js/patch.js" async></script>
    

    <script type="text/javascript">

        // Store video configuration
        let videoConfig = {
            mainVideo: "",
            mainVideoFallbackImage: ""
        };

        // Listen for video configuration from parent window
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'VIDEO_CONFIG') {
                console.log('Received video config:', event.data);
                videoConfig.mainVideo = event.data.mainVideo || "";
                videoConfig.mainVideoFallbackImage = event.data.mainVideoFallbackImage || "";
                
                // If patch is already loaded, update variables
                if (CABLES.patch) {
                    console.log('Updating existing patch with new video config');
                    if (videoConfig.mainVideo) {
                        CABLES.patch.setVariable('mainVideo', videoConfig.mainVideo);
                    }
                    if (videoConfig.mainVideoFallbackImage) {
                        CABLES.patch.setVariable('mainVideoFallbackImage', videoConfig.mainVideoFallbackImage);
                    }
                }
            }
        });

        function showError(initiator,...args)
        {
            CABLES.logErrorConsole("[" + initiator + "]", ...args);
        }

        function patchInitialized(patch)
        {
            // You can now access the patch object (patch), register variable watchers and so on
            console.log('Patch initialized with config:', videoConfig);
        }

        function patchFinishedLoading(patch)
        {
            // The patch is ready now, all assets have been loaded
            console.log('Patch finished loading');
        }

        document.addEventListener("CABLES.jsLoaded", function (event)
        {
            console.log('Creating CABLES patch with video config:', videoConfig);
            CABLES.patch = new CABLES.Patch({
                patch: CABLES.exportedPatch,
                "prefixAssetPath": "",
                "assetPath": "assets/",
                "jsPath": "js/",
                "glCanvasId": "glcanvas",
                "glCanvasResizeToWindow": true,
                "onError": showError,
                "onPatchLoaded": patchInitialized,
                "onFinishedLoading": patchFinishedLoading,
                "canvas": {"alpha":true, "premultipliedAlpha":true }, // make canvas transparent
                variables: {
                    "mainVideo": videoConfig.mainVideo || "",
                    "mainVideoFallbackImage": videoConfig.mainVideoFallbackImage || ""
                }
            });
        });

        // disable rubberband effect on mobile devices
        document.getElementById('glcanvas').addEventListener('touchmove', (e)=>{ e.preventDefault(); }, false);
    </script>
</body>
</html>
