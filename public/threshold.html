<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Threshold Filter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .image-container {
            filter: brightness(var(--brightness)) grayscale(var(--grayscale)) contrast(var(--contrast));
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-8 antialiased">

    <h1 class="mb-4 text-2xl font-bold text-gray-800 text-center">
        CSS Threshold Filter
    </h1>

    <div
        class="relative w-[300px] h-[400px] mb-4 overflow-hidden rounded-xl shadow-lg cursor-pointer transition-all duration-300 hover:shadow-2xl"
        onclick="reloadImages()">
        <img id="original-image" src="https://picsum.photos/300/400?random=1" alt="Original" class="absolute top-0 left-0 object-cover w-full h-full rounded-xl">
        <img id="filtered-image" src="https://picsum.photos/300/400?random=1" alt="Filtered" class="absolute top-0 left-0 object-cover w-full h-full rounded-xl transition-filter duration-200 z-10 mix-blend-lighten" style="filter: brightness(150%) grayscale(100%) contrast(50000%);">
    </div>
    
    <p class="mb-4 text-sm font-medium text-gray-600">
        Click on the image to change it
    </p>

    <div class="flex flex-col w-[300px] gap-4 p-4 bg-white rounded-xl shadow-lg">
        <!-- Brightness Control -->
        <div class="flex flex-col">
            <label for="brightness-slider" class="text-sm font-medium text-gray-700">Brightness</label>
            <input type="range" id="brightness-slider" min="0" max="500" value="150" class="w-full h-2 my-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-500">
            <div class="flex justify-between gap-2 mt-1">
                <input type="number" id="brightness-min" value="0" class="w-1/2 p-2 text-sm text-center border border-gray-300 rounded-lg">
                <input type="number" id="brightness-max" value="500" class="w-1/2 p-2 text-sm text-center border border-gray-300 rounded-lg">
            </div>
            <label class="flex items-center gap-2 mt-2 text-sm text-gray-600">
                <input type="checkbox" id="animate-brightness" checked class="w-4 h-4 text-blue-600 form-checkbox rounded-md">
                Animate
            </label>
        </div>

        <!-- Grayscale Control -->
        <div class="flex flex-col">
            <label for="grayscale-slider" class="text-sm font-medium text-gray-700">Grayscale</label>
            <input type="range" id="grayscale-slider" min="0" max="100" value="100" class="w-full h-2 my-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-500">
            <div class="flex justify-between gap-2 mt-1">
                <input type="number" id="grayscale-min" value="0" class="w-1/2 p-2 text-sm text-center border border-gray-300 rounded-lg">
                <input type="number" id="grayscale-max" value="100" class="w-1/2 p-2 text-sm text-center border border-gray-300 rounded-lg">
            </div>
            <label class="flex items-center gap-2 mt-2 text-sm text-gray-600">
                <input type="checkbox" id="animate-grayscale" class="w-4 h-4 text-blue-600 form-checkbox rounded-md">
                Animate
            </label>
        </div>

        <!-- Contrast Control -->
        <div class="flex flex-col">
            <label for="contrast-slider" class="text-sm font-medium text-gray-700">Contrast</label>
            <input type="range" id="contrast-slider" min="100" max="100000" value="50000" class="w-full h-2 my-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-500">
            <div class="flex justify-between gap-2 mt-1">
                <input type="number" id="contrast-min" value="100" class="w-1/2 p-2 text-sm text-center border border-gray-300 rounded-lg">
                <input type="number" id="contrast-max" value="100000" class="w-1/2 p-2 text-sm text-center border border-gray-300 rounded-lg">
            </div>
            <label class="flex items-center gap-2 mt-2 text-sm text-gray-600">
                <input type="checkbox" id="animate-contrast" class="w-4 h-4 text-blue-600 form-checkbox rounded-md">
                Animate
            </label>
        </div>
    </div>

    <script>
        const filteredImage = document.getElementById('filtered-image');

        const brightnessSlider = document.getElementById('brightness-slider');
        const grayscaleSlider = document.getElementById('grayscale-slider');
        const contrastSlider = document.getElementById('contrast-slider');

        const brightnessMinInput = document.getElementById('brightness-min');
        const brightnessMaxInput = document.getElementById('brightness-max');
        const grayscaleMinInput = document.getElementById('grayscale-min');
        const grayscaleMaxInput = document.getElementById('grayscale-max');
        const contrastMinInput = document.getElementById('contrast-min');
        const contrastMaxInput = document.getElementById('contrast-max');

        const animateBrightnessCheckbox = document.getElementById('animate-brightness');
        const animateGrayscaleCheckbox = document.getElementById('animate-grayscale');
        const animateContrastCheckbox = document.getElementById('animate-contrast');

        let animatingBrightness = animateBrightnessCheckbox.checked;
        let animatingGrayscale = animateGrayscaleCheckbox.checked;
        let animatingContrast = animateContrastCheckbox.checked;

        let currentBrightness = parseInt(brightnessSlider.value);
        let currentGrayscale = parseInt(grayscaleSlider.value);
        let currentContrast = parseInt(contrastSlider.value);

        let brightnessDirection = 1;
        let grayscaleDirection = 1;
        let contrastDirection = 1;

        function updateFilter() {
            filteredImage.style.filter = `brightness(${brightnessSlider.value}%) grayscale(${grayscaleSlider.value}%) contrast(${contrastSlider.value}%)`;
        }

        function updateSliderLimits(slider, minInput, maxInput) {
            slider.min = minInput.value;
            slider.max = maxInput.value;
        }

        function animateValues() {
            if (animatingBrightness) {
                const min = parseInt(brightnessMinInput.value);
                const max = parseInt(brightnessMaxInput.value);
                const progress = (currentBrightness - min) / (max - min);
                const speed = Math.pow(progress, 3) * 5 + 1;
                currentBrightness += brightnessDirection * speed;
                if (currentBrightness >= max || currentBrightness <= min) {
                    brightnessDirection *= -1;
                }
                currentBrightness = Math.max(min, Math.min(currentBrightness, max));
                brightnessSlider.value = Math.round(currentBrightness);
            }

            if (animatingGrayscale) {
                const min = parseInt(grayscaleMinInput.value);
                const max = parseInt(grayscaleMaxInput.value);
                currentGrayscale += grayscaleDirection * 1;
                if (currentGrayscale >= max || currentGrayscale <= min) {
                    grayscaleDirection *= -1;
                }
                currentGrayscale = Math.max(min, Math.min(currentGrayscale, max));
                grayscaleSlider.value = Math.round(currentGrayscale);
            }

            if (animatingContrast) {
                const min = parseInt(contrastMinInput.value);
                const max = parseInt(contrastMaxInput.value);
                currentContrast += contrastDirection * 10;
                if (currentContrast >= max || currentContrast <= min) {
                    contrastDirection *= -1;
                }
                currentContrast = Math.max(min, Math.min(currentContrast, max));
                contrastSlider.value = Math.round(currentContrast);
            }

            updateFilter();
            requestAnimationFrame(animateValues);
        }

        brightnessSlider.addEventListener('input', updateFilter);
        grayscaleSlider.addEventListener('input', updateFilter);
        contrastSlider.addEventListener('input', updateFilter);

        animateBrightnessCheckbox.addEventListener('change', () => {
            animatingBrightness = animateBrightnessCheckbox.checked;
            if (!animatingBrightness) currentBrightness = parseInt(brightnessSlider.value);
        });

        animateGrayscaleCheckbox.addEventListener('change', () => {
            animatingGrayscale = animateGrayscaleCheckbox.checked;
            if (!animatingGrayscale) currentGrayscale = parseInt(grayscaleSlider.value);
        });

        animateContrastCheckbox.addEventListener('change', () => {
            animatingContrast = animateContrastCheckbox.checked;
            if (!animatingContrast) currentContrast = parseInt(contrastSlider.value);
        });

        brightnessMinInput.addEventListener('input', () => updateSliderLimits(brightnessSlider, brightnessMinInput, brightnessMaxInput));
        brightnessMaxInput.addEventListener('input', () => updateSliderLimits(brightnessSlider, brightnessMinInput, brightnessMaxInput));
        grayscaleMinInput.addEventListener('input', () => updateSliderLimits(grayscaleSlider, grayscaleMinInput, grayscaleMaxInput));
        grayscaleMaxInput.addEventListener('input', () => updateSliderLimits(grayscaleSlider, grayscaleMinInput, grayscaleMaxInput));
        contrastMinInput.addEventListener('input', () => updateSliderLimits(contrastSlider, contrastMinInput, contrastMaxInput));
        contrastMaxInput.addEventListener('input', () => updateSliderLimits(contrastSlider, contrastMinInput, contrastMaxInput));

        function reloadImages() {
            const timestamp = new Date().getTime();
            document.getElementById('original-image').src = `https://picsum.photos/300/400?random=1&t=${timestamp}`;
            document.getElementById('filtered-image').src = `https://picsum.photos/300/400?random=1&t=${timestamp}`;
        }

        // Initial call to start the animation loop
        animateValues();
    </script>
</body>
</html>
